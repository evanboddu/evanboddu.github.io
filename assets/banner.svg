<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="Evan Jones Boddu — data engineer and storyteller">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fd4be"/>
      <stop offset="1" stop-color="#ffbe55"/>
    </linearGradient>
  </defs>

  <!-- console ground -->
  <rect width="900" height="220" rx="16" fill="#0a1715"/>
  <rect width="900" height="220" rx="16" fill="none" stroke="#1e3833" stroke-width="2"/>

  <!-- dot grid -->
  <g fill="#94c7b7" opacity="0.12">
    <circle cx="40" cy="40" r="1.5"/><circle cx="90" cy="70" r="1.5"/><circle cx="140" cy="35" r="1.5"/>
    <circle cx="760" cy="45" r="1.5"/><circle cx="820" cy="80" r="1.5"/><circle cx="860" cy="40" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="120" cy="195" r="1.5"/><circle cx="800" cy="185" r="1.5"/>
    <circle cx="850" cy="160" r="1.5"/><circle cx="720" cy="190" r="1.5"/><circle cx="180" cy="165" r="1.5"/>
  </g>

  <!-- terminal prompt -->
  <text x="60" y="62" font-family="Menlo, Consolas, monospace" font-size="15" fill="#2fd4be">evan@dallas:~$ whoami</text>
  <rect x="262" y="49" width="9" height="16" fill="#ffbe55">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- name -->
  <text x="58" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#e7f2ec">Evan Jones Boddu<tspan fill="#ffbe55">.</tspan></text>

  <!-- tagline -->
  <text x="60" y="156" font-family="Georgia, serif" font-style="italic" font-size="19" fill="#8aa89e">Senior data engineer. Storyteller by nature. Wanderer by habit.</text>

  <!-- pipeline -->
  <line x1="60" y1="190" x2="840" y2="190" stroke="#1e3833" stroke-width="2"/>
  <line x1="60" y1="190" x2="840" y2="190" stroke="url(#line)" stroke-width="2" stroke-dasharray="10 14">
    <animate attributeName="stroke-dashoffset" values="0;-24" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- records flowing -->
  <circle r="4" cy="190" fill="#2fd4be">
    <animate attributeName="cx" values="60;840" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" cy="190" fill="#ffbe55">
    <animate attributeName="cx" values="60;840" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" cy="190" fill="#7fd8f7">
    <animate attributeName="cx" values="60;840" dur="4.5s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="4.5s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- stage nodes -->
  <g font-family="Menlo, Consolas, monospace" font-size="11" fill="#8aa89e" text-anchor="middle">
    <circle cx="60" cy="190" r="5" fill="#0a1715" stroke="#2fd4be" stroke-width="2"/>
    <text x="60" y="212">raw</text>
    <circle cx="255" cy="190" r="5" fill="#0a1715" stroke="#2fd4be" stroke-width="2"/>
    <text x="255" y="212">refined</text>
    <circle cx="450" cy="190" r="5" fill="#0a1715" stroke="#2fd4be" stroke-width="2"/>
    <text x="450" y="212">curated</text>
    <circle cx="645" cy="190" r="5" fill="#0a1715" stroke="#2fd4be" stroke-width="2"/>
    <text x="645" y="212">lineage</text>
    <circle cx="840" cy="190" r="5" fill="#0a1715" stroke="#ffbe55" stroke-width="2"/>
    <text x="840" y="212">served</text>
  </g>
</svg>
